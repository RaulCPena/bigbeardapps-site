<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Big Beard Apps — questions, feedback, and support for Feastmark and PayoffPilot.">
    <title>Contact — Big Beard Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #fff;
            background: #0d0c0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px clamp(20px, 5vw, 56px);
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .nav-brand img {
            height: 34px;
            border-radius: 9px;
            background: #fff;
            padding: 3px;
            color-scheme: light;
        }
        nav .nav-back {
            color: #b9b3a8;
            text-decoration: none;
            font-size: 0.92em;
            font-weight: 500;
        }
        nav .nav-back:hover { color: #fff; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px 80px;
            position: relative;
            overflow: hidden;
        }
        .glow {
            position: absolute;
            top: -220px; left: 50%;
            width: 640px; height: 640px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(212,146,42,0.26) 0%, rgba(212,146,42,0.06) 45%, transparent 70%);
            filter: blur(50px);
            pointer-events: none;
        }
        .card {
            position: relative;
            width: 100%;
            max-width: 520px;
            background: #171512;
            border: 1px solid #2b271f;
            border-radius: 24px;
            padding: clamp(28px, 5vw, 44px);
        }
        .card h1 {
            font-size: 1.9em;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }
        .card h1 span { color: #D4A843; }
        .card > p {
            color: #b9b3a8;
            font-size: 0.98em;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: #cfc6b4;
            margin-bottom: 6px;
        }
        input, textarea, select {
            width: 100%;
            background: #0d0c0a;
            border: 1px solid #353026;
            border-radius: 12px;
            color: #fff;
            font: inherit;
            font-size: 0.95em;
            padding: 12px 14px;
            margin-bottom: 18px;
            transition: border-color 0.15s ease;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #D4922A;
        }
        textarea { min-height: 130px; resize: vertical; }
        select { appearance: none; -webkit-appearance: none; }

        button {
            width: 100%;
            background: #D4922A;
            color: #fff;
            border: none;
            font: inherit;
            font-weight: 700;
            font-size: 1em;
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(212,146,42,0.30);
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(212,146,42,0.40);
        }
        button:disabled {
            opacity: 0.6;
            cursor: default;
            transform: none;
        }

        .status {
            display: none;
            text-align: center;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            margin-top: 18px;
        }
        .status.ok { display: block; background: #17251a; color: #7fd191; border: 1px solid #26492f; }
        .status.err { display: block; background: #2b1a17; color: #e09a8d; border: 1px solid #4d2b24; }

        footer {
            color: #8d867a;
            text-align: center;
            padding: 32px 20px;
            font-size: 0.88em;
        }
        footer a { color: #b9b3a8; text-decoration: none; margin: 0 12px; }
        footer a:hover { color: #fff; }

        /* honeypot */
        .hp { position: absolute; left: -9999px; opacity: 0; }
    </style>
</head>
<body>

<nav>
    <a class="nav-brand" href="/">
        <img src="/payoffpilot/images/bigbeard-logo.png" alt="">
        Big Beard Apps
    </a>
    <a class="nav-back" href="/">← Back to home</a>
</nav>

<main>
    <div class="glow"></div>
    <div class="card">
        <h1>Get in <span>touch</span></h1>
        <p>Questions, feedback, or need help with one of the apps? Send a message and I'll get back to you.</p>

        <form id="contact-form" action="https://formspree.io/f/xaqrdprd" method="POST">
            <input type="hidden" name="_subject" value="New message from bigbeardapps.com">
            <input type="text" name="_gotcha" class="hp" tabindex="-1" autocomplete="off">

            <label for="name">Name</label>
            <input type="text" id="name" name="name" required autocomplete="name">

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">

            <label for="topic">Topic</label>
            <select id="topic" name="topic">
                <option>Feastmark</option>
                <option>PayoffPilot</option>
                <option>Something else</option>
            </select>

            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit" id="submit-btn">Send message</button>
            <div class="status" id="form-status"></div>
        </form>
    </div>
</main>

<footer>
    <a href="/feastmark/privacy.html">Feastmark Privacy</a>
    <a href="/payoffpilot/privacy.html">PayoffPilot Privacy</a>
    <p style="margin-top:14px;">&copy; 2025&ndash;2026 Big Beard Apps. All rights reserved.</p>
</footer>

<script>
    const form = document.getElementById('contact-form');
    const btn = document.getElementById('submit-btn');
    const status = document.getElementById('form-status');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        btn.disabled = true;
        btn.textContent = 'Sending…';
        status.className = 'status';

        try {
            const res = await fetch(form.action, {
                method: 'POST',
                headers: { 'Accept': 'application/json' },
                body: new FormData(form)
            });
            if (res.ok) {
                status.textContent = "Message sent — thanks! I'll get back to you soon.";
                status.className = 'status ok';
                form.reset();
            } else {
                throw new Error('Submission failed');
            }
        } catch {
            status.textContent = "Couldn't send right now — please try again in a minute.";
            status.className = 'status err';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send message';
        }
    });
</script>

</body>
</html>
